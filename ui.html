<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MSX UI</title>

<style>
body {
    background: #141414;
    color: white;
    font-family: Arial;
    margin: 0;
}

.header {
    padding: 20px;
}

.search-box {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    border-radius: 8px;
    border: none;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 150px);
    gap: 15px;
    padding: 20px;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card {
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
    <input type="text" id="search" class="search-box" placeholder="Buscar anime...">
</div>

<div id="content" class="grid"></div>

<script>
const params = new URLSearchParams(window.location.search);
const url = params.get("url");let url = params.get("url");

if (!url || url === "null") {
    document.body.innerHTML += "<p style='color:red'>ERROR: No llegó URL</p>";
}
document.body.innerHTML += "<p>URL: " + url + "</p>";

let dataGlobal = [];

fetch(url)
.then(r => r.json())
.then(data => {
    dataGlobal = data.items;
    render(data.items);
});

function render(items) {
    const container = document.getElementById("content");
    container.innerHTML = "";

    items.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${item.image}">
            <p>${item.title}</p>
        `;

        div.onclick = () => {
            let url = item.action
                .replace("content:", "")
                .replace("interaction:", "");

            window.location.href = url;
};

        container.appendChild(div);
    });
}

document.getElementById("search").addEventListener("input", e => {
    const value = e.target.value.toLowerCase();

    const filtered = dataGlobal.filter(i =>
        i.title.toLowerCase().includes(value)
    );

    render(filtered);
});
</script>

</body>
</html>
